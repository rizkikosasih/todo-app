<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rect -->
  <rect width="32" height="32" rx="8" fill="#18181b" />
  <!-- Shield outline -->
  <path d="M16 5 L25 8 C25 17 16 25 16 25 C16 25 7 17 7 8 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="2" stroke-linejoin="round" />
  <!-- Glowing neon green checkmark representing completed tasks -->
  <path d="M11 14 L14.5 17.5 L21 11" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>